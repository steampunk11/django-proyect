{% extends 'base.html' %}

{% block content %}

<!-- Page Header -->
<section class="csig-page-header csig-fade-in">
  <h1>
    <i class="bi bi-calendar2-check me-2" style="color:var(--color-deep-lilac);"></i>
    Actualizar Agendamiento
  </h1>
  <div class="sigil-divider">
    <span class="sigil-star"></span>
    <span style="font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted);">
      MODIFICAR DATOS DEL EVENTO
    </span>
    <span class="sigil-star"></span>
  </div>
</section>

<!-- Form -->
<div class="csig-form-wrapper csig-fade-in">
  <p class="csig-form-subtitle">Actualiza los campos del agendamiento.</p>

  <form method="POST" id="update-schedule-form">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="csig-action-row" style="margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary" id="btn-update-schedule-submit">
        <i class="bi bi-check2-circle me-1"></i>Guardar Cambios
      </button>
      <a href="{% url 'scheduling' %}" class="btn btn-outline-secondary" id="btn-cancel-upd-schedule">
        <i class="bi bi-x-circle me-1"></i>Cancelar
      </a>
    </div>
  </form>
</div>

{% endblock %}
