{% extends 'base.html' %}

{% block content %}

<!-- Page Header -->
<section class="csig-page-header csig-fade-in">
  <h1>
    <i class="bi bi-person-plus me-2" style="color:var(--color-deep-lilac);"></i>
    Agregar Registro
  </h1>
  <div class="sigil-divider"><span class="sigil-star"></span></div>
</section>

<!-- Form -->
<div class="csig-form-wrapper csig-fade-in">
  <p class="csig-form-subtitle">
    Completa los campos para crear un nuevo registro de cliente.
  </p>

  <form method="POST" id="add-record-form">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="csig-action-row" style="margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary" id="btn-save-record">
        <i class="bi bi-floppy me-1"></i>Guardar Registro
      </button>
      <a href="{% url 'home' %}" class="btn btn-outline-secondary" id="btn-cancel-add">
        <i class="bi bi-x-circle me-1"></i>Cancelar
      </a>
    </div>
  </form>
</div>

{% endblock %}
