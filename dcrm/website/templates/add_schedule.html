{% extends 'base.html' %} 
{% block content %}
    <div class="col-md-6 offset-md-3">
    <h1 class="text-center">Agregar Registro</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-secondary w-100">Guardar</button>
        <a href="{% url 'scheduling' %}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
    </form>
</div>

    
{% endblock %}
