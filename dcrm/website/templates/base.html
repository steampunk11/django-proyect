{% load static %}
{% load django_bootstrap5 %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="CRM Sistema de gestión de clientes y agendamientos">
    <title>Django CRM — CyberSigilism</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
          crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts (Orbitron + Rajdhani + Share Tech Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap"
          rel="stylesheet">

    <!-- CyberSigilism Theme -->
    <link rel="stylesheet" href="{% static 'css/cybersigilism.css' %}">
    <!-- Bootstrap Overrides -->
    <link rel="stylesheet" href="{% static 'css/bs-overrides.css' %}">
  </head>
  <body>

    <!-- Particle canvas (background) -->
    <canvas id="csig-canvas"
            style="position:fixed;inset:0;z-index:-1;pointer-events:none;"></canvas>

    <!-- Scanline overlay -->
    <div class="csig-scanlines" aria-hidden="true"></div>

    <!-- Navigation -->
    {% include 'navbar.html' %}

    <!-- Main content -->
    <main class="container mt-4" id="main-content">

      <!-- Flash messages -->
      {% if messages %}
        <div class="csig-fade-in" role="alert" aria-live="polite">
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
              <span class="sigil-star" aria-hidden="true"></span>
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}

    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I"
            crossorigin="anonymous"></script>

    <!-- CyberSigilism Animations -->
    <script src="{% static 'js/cybersigilism.js' %}"></script>
  </body>
</html>
